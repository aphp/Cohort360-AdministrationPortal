name: cohort360-main-pipeline

on:
  push:
    branches:
      - develop
      - main
      - release/**
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type

      - name: Build
        run: npm run build

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  publish:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check correct tag and version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          if [[ "$GITHUB_REF" = "refs/heads/main" ]]; then
            echo "Publishing main version $VERSION"
            exit 0
          fi

          RELEASE_VERSION="${GITHUB_REF#refs/heads/release/}"

          if [[ "$RELEASE_VERSION" = "$GITHUB_REF" ]]; then
            echo "Publish is only allowed from main or release/* branches"
            exit 1
          fi

          if [[ "$VERSION" != "$RELEASE_VERSION" ]]; then
            echo "The package.json version must match the release branch name"
            echo "Branch version: $RELEASE_VERSION"
            echo "Package version: $VERSION"
            exit 1
          fi

          case "$VERSION" in
            *SNAPSHOT)
              echo "Release branches must not publish SNAPSHOT versions"
              exit 1
              ;;
          esac

          echo "Publishing version $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ github.ref == 'refs/heads/main' && format('aphpid/cohort360-administrationportal:{0},aphpid/cohort360-administrationportal:latest',env.VERSION) || format('aphpid/cohort360-administrationportal:{0}',env.VERSION) }}
