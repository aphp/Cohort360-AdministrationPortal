name: commitlint

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install commit-lint
        run: |
          npm install --no-save conventional-changelog-conventionalcommits @commitlint/config-conventional commitlint@latest
      - name: Fix commitlint error
        run: |
          sed -i 's/"type": "module",//g' package.json
      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: npx commitlint --from HEAD~1 --to HEAD --verbose
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: |
          RANGE="${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }}..${{ github.event.pull_request.head.sha }}"

          for commit in $(git rev-list --reverse "$RANGE"); do
            subject="$(git log -1 --format=%s "$commit")"

            if [[ "$subject" =~ ^\([^)]+\).+: ]]; then
              echo "::notice::Skipping legacy squash commit message: $subject"
              continue
            fi

            git log -1 --format=%B "$commit" | npx commitlint --verbose
          done
      - name: Validate PR title with commitlint
        if: github.event_name == 'pull_request'
        run: |
          echo "${{github.event.pull_request.title}}" | npx commitlint
